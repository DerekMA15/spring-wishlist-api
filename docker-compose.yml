services:
  db:
    image: postgres:15
    container_name: wishlist-db
    restart: always
    environment:
      POSTGRES_DB: wishlist_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d wishlist_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: wishlist-api
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/wishlist_db
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update