
# URL de conexão: porta padrão do Postgres é 5432
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/wishlist_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}

# Driver do PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
# 'update' cria as tabelas automaticamente se elas não existirem
spring.jpa.hibernate.ddl-auto=update

# Mostra o SQL no console (útil para aprender o que o Spring está fazendo por baixo)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true